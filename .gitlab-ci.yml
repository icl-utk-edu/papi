# Stages
# 1. Set current working directory i.e. cd src
# 2. install i.e. install papi
# 3. Test

cuda-component-job:
  before_script:
    - cd src
    - export PAPI_CUDA_ROOT=/usr/local/cuda
  script:
    - ./configure --prefix=$PWD/test-install --with-components="cuda" --with-debug=yes
    - make && make install
    - utils/papi_component_avail
    - bash components/cuda/tests/run_cuda_tests.sh
  parallel:
    matrix:
      - IMAGE: [nvidia/cuda:12.8.2-devel-ubuntu24.04, nvidia/cuda:12.9.1-devel-ubuntu22.04]
        ARCH: [nvidia-gh200, nvidia-rtx6000]
  image: ${IMAGE}
  tags:
    - ${ARCH}