stages:
  - pre
  - configure
  - make
  - test

job1:
  stage: pre
  script:
    - echo "TAG=hpsf-x86_64" >> job.env
    - echo "COMPONENT_NAME=powercap" >> job.env
  artifacts:
    reports:
      dotenv: job.env

job2:
  stage: configure
  tags: ${TAG}
  script:
    - ./configure --prefix=$PWD/test-install --with-components="$COMPONENT_NAME"

    
