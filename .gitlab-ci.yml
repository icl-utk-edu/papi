# Stages
# 1. Set current working directory i.e. cd src
# 2. install i.e. install papi
# 3. Test

cuda-component-job:
  before_script:
    - cd src
    - export PAPI_CUDA_ROOT=/usr/local/cuda
  script:
    - bash ../install_papi.sh --with-components="cuda"
    - bash components/cuda/tests/run_cuda_tests.sh
  parallel:
    matrix:
      - IMAGE: [nvidia/cuda:12.8.2-devel-ubuntu24.04, nvidia/cuda:12.9.1-devel-ubuntu22.04]
        ARCH: [nvidia-gh200, nvidia-rtx6000]
  image: ${IMAGE}
  tags:
    - ${ARCH}

amd-smi-component-job:
  before_script:
    - cd src
    - export PAPI_AMDSMI_ROOT=/opt/rocm/
    - cat /opt/rocm/.info/version
  script:
    - bash ../install_papi.sh --with-components="amd_smi"
    - bash components/amd_smi/tests/runtest.sh
  parallel:
    matrix:
      - IMAGE: [rocm/dev-ubuntu-24.04:7.0.2-complete, rocm/dev-ubuntu-24.04:7.2.2-complete]
        ARCH: [amd-mi210, amd-mi300]
  image: ${IMAGE}
  tags:
    - ${ARCH}
